services:
  postgres:
    image: postgres:16-alpine
    container_name: quizforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quizforge
      POSTGRES_PASSWORD: quizforge
      POSTGRES_DB: quizforge
    volumes:
      - quizforge-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quizforge-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - quizforge-redis-data:/data

volumes:
  quizforge-postgres-data:
  quizforge-redis-data:
